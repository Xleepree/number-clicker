<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" user-scalable="no">
        <title>num.clicker</title>
        <link rel="icon" type="image/x-icon" href="images/main/favicon.png">
        <link rel="stylesheet" href="global.css">

        <script src="src/core.js"></script>
        <script src="src/data.js" defer></script>
        <script src="src/player.js" defer></script>
        <script src="src/points.js" defer></script>
        <script src="src/multimedia.js" defer></script>
        <script src="src/ui.js" defer></script>
        <script src="src/upgrades.js" defer></script>
        <script src="src/ach.js" defer></script>
        <script src="src/bootstrap.js" defer></script>
    </head>

    <body>
        <div class="pageGrid">

            <div id="main_menu"></div>

            <div class="counterHolder">
                <div class="counterLines">
                    <div>
                        <p><b>number clicker </b><span id="main_counterLinesVersion"></span></p>
                    </div>
                    <div>
                        <p><b>save slot </b><span id="main_saveSlotDisplay">0</span></p>
                    </div>
                </div>

                <div class="pointCounter" onclick="NC.Points.increasePoints()">
                    <div id="main_pointCounterGradient"></div>
                    <h1 id="main_points">0</h1>
                </div>

                <div class="counterLines">
                    <div>
                        <p><b>CPS</b> <span id="stat_cpsMeter">0</span></p>
                    </div>
                    <div>
                        <p><b>click power</b> <span id="stat_clickPowerDisplay">1 point</span></p>
                    </div>
                </div>
            </div>

            <div id="main_store"></div>

        </div>
    </body>
</html>
